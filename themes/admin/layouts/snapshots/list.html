{{ define "main" }}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
  <h2 class="h5 mb-0 fw-semibold">{{ .Title }}</h2>
  <div class="d-flex align-items-center gap-2 flex-wrap">
    <div class="btn-group btn-group-sm" role="group" aria-label="Refresh from source">
      <button type="button" class="btn btn-outline-secondary" id="btn-src-github" onclick="setSource('github')" title="Load from GitHub data repo">
        <i class="bi bi-github me-1"></i>GitHub
      </button>
      <button type="button" class="btn btn-outline-secondary" id="btn-src-gcs" onclick="setSource('gcs')" title="Load from GCS bucket">
        <i class="bi bi-cloud me-1"></i>GCS
      </button>
      <button type="button" class="btn btn-outline-secondary active" id="btn-src-api" onclick="setSource('api')" title="Load from backend API">
        <i class="bi bi-database me-1"></i>API
      </button>
    </div>
    <button class="btn btn-sm btn-outline-success" id="btn-sync" onclick="runSync()" title="Dump snapshot data to GCS and GitHub">
      <i class="bi bi-arrow-repeat me-1"></i>Sync to GCS
    </button>
  </div>
</div>

<div id="auth-guard" class="alert alert-warning d-none">
  <i class="bi bi-lock me-1"></i>You must be <a href="{{ "" | relURL }}">signed in</a> to view snapshots.
</div>

<!-- Tabs -->
<ul class="nav nav-tabs mb-3" id="snapshot-tabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="tab-polymarket-btn" data-bs-toggle="tab" data-bs-target="#tab-polymarket" type="button" role="tab">
      Polymarket Snapshot
    </button>
  </li>
</ul>

<div class="tab-content" id="snapshot-tab-content">
  <!-- Polymarket Snapshot tab -->
  <div class="tab-pane fade show active" id="tab-polymarket" role="tabpanel">

    <!-- Filters -->
    <div class="card shadow-sm border-0 mb-3" id="filters-card">
      <div class="card-body py-3">
        <div class="row g-2 align-items-end">
          <div class="col-sm-auto">
            <label class="form-label small fw-medium mb-1" for="filter-city">City</label>
            <select class="form-select form-select-sm" id="filter-city" style="min-width:140px">
              <option value="">All cities</option>
            </select>
          </div>
          <div class="col-sm-auto">
            <label class="form-label small fw-medium mb-1" for="filter-date-from">From</label>
            <input type="date" class="form-control form-control-sm" id="filter-date-from">
          </div>
          <div class="col-sm-auto">
            <label class="form-label small fw-medium mb-1" for="filter-date-to">To</label>
            <input type="date" class="form-control form-control-sm" id="filter-date-to">
          </div>
          <div class="col-sm-auto">
            <label class="form-label small fw-medium mb-1" for="filter-limit">Limit</label>
            <select class="form-select form-select-sm" id="filter-limit">
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
              <option value="0">No limit</option>
            </select>
          </div>
          <div class="col-sm-auto">
            <button class="btn btn-primary btn-sm" onclick="loadSnapshots()">
              <i class="bi bi-search me-1"></i>Query
            </button>
          </div>
          <div class="col-sm-auto ms-auto d-flex align-items-center gap-2">
            <span id="source-badge" class="badge bg-secondary d-none"></span>
            <div class="form-check form-switch mb-0" title="Toggle chart / table">
              <input class="form-check-input" type="checkbox" role="switch" id="view-toggle" checked onchange="toggleView()">
              <label class="form-check-label small" for="view-toggle" id="view-toggle-label">Chart</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center py-5 d-none">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="empty-state" class="text-center py-5 d-none">
      <i class="bi bi-inbox fs-1 text-muted"></i>
      <p class="text-muted mt-2">No snapshots found for these filters.</p>
    </div>

    <!-- Chart view -->
    <div class="card shadow-sm border-0 d-none" id="snapshots-chart-card">
      <div class="card-body">
        <canvas id="snapshots-chart" style="max-height:480px"></canvas>
      </div>
    </div>

    <!-- Table view -->
    <div class="card shadow-sm border-0 d-none" id="snapshots-table-card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 small">
            <thead class="table-light">
              <tr>
                <th class="ps-3">City</th>
                <th>Date</th>
                <th>Timestamp (UTC)</th>
                <th>Threshold °C</th>
                <th>YES</th>
                <th>NO</th>
                <th>Spread</th>
                <th>Vol 24h</th>
                <th>Liquidity</th>
                <th>Event Slug</th>
              </tr>
            </thead>
            <tbody id="snapshots-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
{{ end }}

{{ define "page-scripts" }}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
  let currentSource = 'api';
  let staticSnapshots = null;
  let snapshotsChart = null;
  let lastRows = [];
  let chartMode = true; // true = chart, false = table

  const LINE_COLORS = [
    '#0d6efd','#dc3545','#198754','#fd7e14','#6f42c1',
    '#20c997','#ffc107','#0dcaf0','#6610f2','#d63384',
  ];

  firebase.auth().onAuthStateChanged(async user => {
    if (!user) {
      document.getElementById('filters-card').classList.add('d-none');
      document.getElementById('auth-guard').classList.remove('d-none');
      return;
    }
    // Default date range: today
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('filter-date-from').value = today;
    document.getElementById('filter-date-to').value = today;
    await populateCityFilter();
  });

  async function populateCityFilter() {
    try {
      const cities = await api('GET', '/tracked-cities');
      const sel = document.getElementById('filter-city');
      cities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.city;
        opt.textContent = c.display_name;
        sel.appendChild(opt);
      });
    } catch (e) {
      // non-fatal
    }
  }

  function setSource(source) {
    currentSource = source;
    staticSnapshots = null;
    ['github', 'gcs', 'api'].forEach(s => {
      document.getElementById(`btn-src-${s}`).classList.toggle('active', s === source);
    });
    const badge = document.getElementById('source-badge');
    if (source !== 'api') {
      badge.textContent = `data from ${source} (last sync)`;
      badge.classList.remove('d-none');
    } else {
      badge.classList.add('d-none');
    }
  }

  function toggleView() {
    chartMode = document.getElementById('view-toggle').checked;
    document.getElementById('view-toggle-label').textContent = chartMode ? 'Chart' : 'Table';
    if (lastRows.length === 0) return;
    document.getElementById('snapshots-chart-card').classList.toggle('d-none', !chartMode);
    document.getElementById('snapshots-table-card').classList.toggle('d-none', chartMode);
  }

  async function loadSnapshots() {
    const city     = document.getElementById('filter-city').value;
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo   = document.getElementById('filter-date-to').value;
    const limit    = document.getElementById('filter-limit').value; // "0" = no limit

    const loadingEl    = document.getElementById('loading');
    const emptyEl      = document.getElementById('empty-state');
    const chartCardEl  = document.getElementById('snapshots-chart-card');
    const tableCardEl  = document.getElementById('snapshots-table-card');

    loadingEl.classList.remove('d-none');
    emptyEl.classList.add('d-none');
    chartCardEl.classList.add('d-none');
    tableCardEl.classList.add('d-none');

    try {
      let rows;

      if (currentSource === 'github' || currentSource === 'gcs') {
        if (!staticSnapshots) {
          staticSnapshots = currentSource === 'github'
            ? await loadFromGitHub('data/snapshots.jsonl')
            : await loadFromGCS('data/snapshots.jsonl');
        }
        rows = staticSnapshots;
        if (city)     rows = rows.filter(r => r.city === city);
        if (dateFrom) rows = rows.filter(r => r.date >= dateFrom);
        if (dateTo)   rows = rows.filter(r => r.date <= dateTo);
        if (limit !== '0') rows = rows.slice(0, parseInt(limit));
      } else {
        // dateFrom == dateTo → use single date param for simpler BQ query
        const params = { city, limit };
        if (dateFrom && dateTo && dateFrom === dateTo) {
          params.date = dateFrom;
        } else {
          if (dateFrom) params.date_from = dateFrom;
          if (dateTo)   params.date_to   = dateTo;
        }
        rows = await api('GET', '/snapshots' + qs(params));
      }

      loadingEl.classList.add('d-none');
      if (!rows || rows.length === 0) {
        emptyEl.classList.remove('d-none');
        return;
      }

      lastRows = rows;
      renderChart(rows);
      renderTable(rows);
      chartCardEl.classList.toggle('d-none', !chartMode);
      tableCardEl.classList.toggle('d-none', chartMode);
    } catch (e) {
      loadingEl.classList.add('d-none');
      showToast('Query failed (' + currentSource + '): ' + e.message, 'danger');
    }
  }

  function renderChart(rows) {
    rows.sort((a, b) => a.timestamp < b.timestamp ? -1 : 1);

    const byThreshold = {};
    rows.forEach(r => {
      const key = r.temp_threshold;
      if (!byThreshold[key]) byThreshold[key] = [];
      byThreshold[key].push({ x: r.timestamp, y: +(r.yes_cost * 100).toFixed(2) });
    });

    const thresholds = Object.keys(byThreshold).sort((a, b) => +a - +b);
    const datasets = thresholds.map((t, i) => ({
      label: `${t}°C`,
      data: byThreshold[t],
      borderColor: LINE_COLORS[i % LINE_COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: 2,
      pointRadius: byThreshold[t].length > 60 ? 0 : 3,
      tension: 0.3,
    }));

    if (snapshotsChart) snapshotsChart.destroy();

    snapshotsChart = new Chart(document.getElementById('snapshots-chart'), {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`,
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { tooltipFormat: 'MMM d, HH:mm', displayFormats: { hour: 'MMM d HH:mm', day: 'MMM d' } },
            title: { display: true, text: 'Timestamp (UTC)' },
          },
          y: {
            min: 0,
            max: 100,
            title: { display: true, text: 'YES %' },
            ticks: { callback: v => v + '%' },
          },
        },
      },
    });
  }

  function renderTable(rows) {
    document.getElementById('snapshots-tbody').innerHTML = rows.map(r => `
      <tr>
        <td class="ps-3 fw-medium">${escHtml(r.city)}</td>
        <td>${escHtml(r.date)}</td>
        <td class="text-muted">${escHtml(r.timestamp)}</td>
        <td>${r.temp_threshold}</td>
        <td>${(r.yes_cost * 100).toFixed(1)}%</td>
        <td>${(r.no_cost * 100).toFixed(1)}%</td>
        <td>${r.spread != null ? r.spread.toFixed(3) : '—'}</td>
        <td>${r.volume_24h != null ? '$' + r.volume_24h.toFixed(0) : '—'}</td>
        <td>${r.liquidity != null ? '$' + r.liquidity.toFixed(0) : '—'}</td>
        <td class="text-muted small font-monospace">${escHtml(r.event_slug)}</td>
      </tr>
    `).join('');
  }

  async function runSync() {
    const btn = document.getElementById('btn-sync');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Syncing…';
    try {
      const result = await api('POST', '/sync');
      const tc = result.tracked_cities;
      const sn = result.snapshots;
      const parts = [
        `Cities: ${tc.count} rows → GCS ${tc.gcs ? '✓' : '✗'}`,
        `Snapshots: ${sn.count} rows → GCS ${sn.gcs ? '✓' : '✗'}`,
        `GitHub: ${result.github ? '✓' : (result.github_skipped ? 'skipped (no token)' : '✗')}`,
      ];
      showToast(parts.join(' | '), tc.gcs && sn.gcs ? 'success' : 'warning');
      if (tc.error) showToast('Cities error: ' + tc.error, 'danger');
      if (sn.error) showToast('Snapshots error: ' + sn.error, 'danger');
      if (result.github_errors) result.github_errors.forEach(e => showToast('GitHub: ' + e, 'danger'));
      staticSnapshots = null;
    } catch (e) {
      showToast('Sync failed: ' + e.message, 'danger');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-arrow-repeat me-1"></i>Sync to GCS';
    }
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str)));
    return d.innerHTML;
  }
</script>
{{ end }}
